<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITS Cardio-AI | Diagnostic Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00796b; --bg: #f8fafc; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f1f5f9 0%, #ffffff 100%); min-height: 100vh; display: flex; color: var(--text); }

        .sidebar { width: 260px; background: var(--primary); color: white; padding: 40px 24px; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .sidebar h1 { font-size: 1.4rem; border-left: 4px solid #80cbc4; padding-left: 15px; margin-bottom: 40px; }
        .nav-active { background: rgba(255,255,255,0.15); padding: 14px; border-radius: 10px; font-weight: 600; }

        .main-content { margin-left: 260px; flex: 1; padding: 50px; max-width: 1200px; }
        .card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 5px; }
        .input-group label { font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; color: #475569; text-transform: uppercase; }
        .input-group input, .input-group select { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: var(--primary); }

        .submit-container { grid-column: span 2; text-align: right; margin-top: 20px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .btn-predict { background: var(--primary); color: white; padding: 16px 45px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-predict:hover { background: #00695c; transform: translateY(-2px); }

        /* The Color Logic Fixes */
        .result-overlay { grid-column: span 2; margin-top: 25px; padding: 25px; border-radius: 16px; text-align: center; }
        .positive { background-color: #fee2e2 !important; color: #991b1b !important; border: 2px solid #f87171 !important; }
        .negative { background-color: #dcfce7 !important; color: #166534 !important; border: 2px solid #4ade80 !important; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>BITS Pilani <br><span style="font-weight:300; opacity: 0.8;">Health AI Lab</span></h1>
        <div class="nav-active">Predictor Engine</div>
    </div>

    <div class="main-content">
        <div class="card">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Patient Risk Profiling</h2>
            <form action="{{ url_for('predict_datapoint')}}" method="POST">
                <div class="form-grid">
                    <div class="input-group"><label>Age</label><input type="number" name="age" required></div>
                    <div class="input-group"><label>Gender</label><select name="sex"><option value="1">Male</option><option value="0">Female</option></select></div>
                    <div class="input-group"><label>Chest Pain</label><select name="cp"><option value="0">Typical</option><option value="1">Atypical</option><option value="2">Non-Anginal</option><option value="3">None</option></select></div>
                    <div class="input-group"><label>Resting BP</label><input type="number" name="trestbps" required></div>
                    <div class="input-group"><label>Cholesterol</label><input type="number" name="chol" required></div>
                    <div class="input-group"><label>Fasting Sugar</label><select name="fbs"><option value="0">Normal</option><option value="1">High</option></select></div>
                    <div class="input-group"><label>Resting ECG</label><select name="restecg"><option value="0">Normal</option><option value="1">ST-T Abnormality</option><option value="2">LVH</option></select></div>
                    <div class="input-group"><label>Max Heart Rate</label><input type="number" name="thalach" required></div>
                    <div class="input-group"><label>Exercise Angina</label><select name="exang"><option value="0">No</option><option value="1">Yes</option></select></div>
                    <div class="input-group"><label>ST Depression</label><input type="number" step="0.1" name="oldpeak" required></div>
                    <div class="input-group"><label>ST Slope</label><select name="slope"><option value="0">Upsloping</option><option value="1">Flat</option><option value="2">Downsloping</option></select></div>
                    <div class="input-group"><label>Major Vessels</label><input type="number" name="ca" min="0" max="3" required></div>
                    <div class="input-group"><label>Thalassemia</label><select name="thal"><option value="1">Normal</option><option value="2">Fixed</option><option value="3">Reversible</option></select></div>

                    <div class="submit-container"><button type="submit" class="btn-predict">Analyze Clinical Data</button></div>

                    {% if results %}
                    <div class="result-overlay {% if 'Detected' in results and 'No' not in results %}positive{% else %}negative{% endif %}">
                        <h3 style="text-transform: uppercase; font-size: 0.8rem; margin-bottom: 5px;">Analysis Verdict</h3>
                        <p style="font-size: 1.6rem; font-weight: 800;">{{results}}</p>
                    </div>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>
</body>
</html>
